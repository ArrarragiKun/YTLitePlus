name: Build and Upload to TestFlight

on:
  push:
    branches:
      - main  # Change this if you want a different branch to trigger the workflow

jobs:
  build-and-upload:
    runs-on: macos-latest  # Uses macOS runner with Xcode pre-installed
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install dependencies (if needed)
        run: pod install  # Only if your project uses CocoaPods

      - name: Build and archive app
        run: |
          xcodebuild clean archive \
          -workspace YTLitePlus.xcworkspace \  # Change if using .xcodeproj
          -scheme YTLitePlus \
          -archivePath $GITHUB_WORKSPACE/build/YTLitePlus.xcarchive \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          DEVELOPMENT_TEAM=YOUR_TEAM_ID  # Replace with your actual team ID

      - name: Export the .ipa file
        run: |
          xcodebuild -exportArchive \
          -archivePath $GITHUB_WORKSPACE/build/YTLitePlus.xcarchive \
          -exportPath $GITHUB_WORKSPACE/build \
          -exportOptionsPlist ExportOptions.plist  # Make sure this file exists

      - name: Upload to TestFlight
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          API_ISSUER: YOUR_ISSUER_ID  # Replace with your App Store Connect issuer ID
        run: |
          xcrun altool --upload-app -f $GITHUB_WORKSPACE/build/YTLitePlus.ipa \
          -t ios --apiKey $API_KEY --apiIssuer $API_ISSUER
